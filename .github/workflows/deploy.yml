# Pages deploy for the Capability Claim Test.
#
# Actions-based GitHub Pages deployment. The built workbench is published
# directly to Pages as an artifact and is never committed to the repo (dist/ is
# gitignored), so there is no committed-bundle merge-conflict class.
#
# REQUIRES (one-time, owner action): Settings -> Pages -> Build and deployment
# -> Source = "GitHub Actions". Until that is set, this workflow runs but Pages
# will not serve from it.

name: deploy

on:
  push:
    branches: ["main", "claude/tender-rubin-n26gr6"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never run two Pages deploys at once; let the latest win.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so the Vite build can stamp the short commit SHA.
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check (typecheck + tests)
        run: npm run check

      - name: Build
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
